# GitHub MCP Server — provides GitHub tools to agents via stdio transport
# Uses kagent MCPServer CRD which handles deployment automatically
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: github-mcp
  namespace: kagent
spec:
  transportType: stdio
  deployment:
    image: ghcr.io/github/github-mcp-server:latest
    port: 8080
    cmd: /server/github-mcp-server
    args:
      - stdio
      - --toolsets
      - all
    secretRefs:
      - name: github-credentials
  stdioTransport: {}
