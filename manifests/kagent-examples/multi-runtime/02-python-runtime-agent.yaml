# Example: Agent Using the Python ADK Runtime (Default)
#
# The Python runtime is the default. It provides access to the full
# Google ADK ecosystem and Python-based integrations.

---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: python-agent
  namespace: kagent
spec:
  type: Declarative
  declarative:
    runtime: python
    modelConfig: gpt4o
    systemMessage: |
      You are a comprehensive operations agent running on the Python
      ADK runtime with full framework support.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_pod_logs
            - k8s_get_events
            - helm_list_releases
            - helm_upgrade
          requireApproval:
            - helm_upgrade
    memory:
      modelConfig: openai-embed
    context:
      eventsCompaction:
        enabled: true
