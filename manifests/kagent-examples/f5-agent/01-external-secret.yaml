# ExternalSecret: F5 BIG-IP credentials
# Pulls F5 management credentials from Vault into a K8s Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: f5-credentials
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: f5-credentials
    creationPolicy: Owner
  data:
    - secretKey: F5_HOST
      remoteRef:
        key: secret/f5
        property: host
    - secretKey: F5_USERNAME
      remoteRef:
        key: secret/f5
        property: username
    - secretKey: F5_PASSWORD
      remoteRef:
        key: secret/f5
        property: password
