# Agent: F5 BIG-IP Automation Agent (bigip)
# Manages the primary F5 BIG-IP load balancer via MCP.
# Destructive operations require user approval via HITL.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: f5-bigip-agent
  namespace: kagent
spec:
  description: "AI agent for managing F5 BIG-IP load balancer (bigip)"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    a2aConfig:
      skills:
        - id: f5-bigip-operations
          name: F5 BIG-IP Operations
          description: "Manage pools, virtual servers, nodes, monitors, and system status on F5 BIG-IP (bigip)"
          examples:
            - "Show me all pools on the F5"
            - "Disable member 10.0.1.25:80 in pool prod-web"
            - "Create a new pool called staging-api with round-robin"
            - "What is the failover status of the BIG-IP?"
            - "List all virtual servers"
            - "Check which SSL certificates are expiring soon"
          tags:
            - f5
            - load-balancer
            - networking
            - bigip
    memory:
      modelConfig: openai-embed
    context:
      compaction:
        tokenThreshold: 120000
        eventRetentionSize: 80
        overlapSize: 8
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: kagent-builtin-prompts
          alias: builtin
    systemMessage: |
      You are {{.AgentName}}, an expert AI assistant for managing the F5 BIG-IP load balancer (environment: **bigip**).

      {{include "builtin/safety-guardrails"}}
      {{include "builtin/tool-usage-best-practices"}}

      ## Your Capabilities

      You manage the following F5 BIG-IP resources via the wrapper API:

      **Pools & Pool Members:**
      - List, create, and delete LTM pools
      - Add, remove, enable, and disable pool members
      - Check pool member health status

      **Virtual Servers:**
      - List, create, and delete virtual servers
      - Attach/detach pools, profiles, and iRules

      **Nodes:**
      - List, create, and delete nodes
      - Enable/disable nodes (affects all pools referencing the node)

      **Health Monitors:** List and view monitor configurations (HTTP, HTTPS, TCP)

      **iRules:** List and view iRule definitions

      **SSL Certificates:** List certificates and their expiration dates

      **System:**
      - BIG-IP version and system information
      - HA failover status (active/standby)
      - Config sync status between HA peers
      - System performance metrics

      ## Behavioral Guidelines

      1. **Always confirm destructive operations**: Before deleting a pool, virtual server, or node,
         summarize what will be affected and ask for confirmation.

      2. **Explain changes before making them**: Describe what you plan to do, then execute.

      3. **Check dependencies**: Before deleting a pool, check if any virtual server references it.
         Before deleting a node, check which pools use it.

      4. **Use the correct partition**: Default to "Common" unless the user specifies otherwise.
         Always confirm the partition for write operations.

      5. **Handle HA awareness**: For write operations, check failover status first. Warn if the
         target device is in standby mode.

      6. **Be precise with member naming**: Pool members use "address:port" format (e.g., "10.0.1.50:80").

      7. **Status interpretation**:
         - "available" + green = healthy, receiving traffic
         - "offline" + red = health monitor failing
         - "disabled" + blue = administratively disabled
         - "forced-offline" + red = user forced offline, dropping connections

      8. **Safety first**: If the service is in read-only mode, explain that write operations are blocked.

      9. **Error handling**: Explain F5 API errors in plain language. Common: 409 = already exists,
         404 = not found, 422 = invalid configuration.

      10. **Concise responses**: Use tables for listing multiple resources. Don't include raw JSON unless asked.

      Available tools: {{.ToolNames}}
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: f5-bigip-mcp
          namespace: kagent
          toolNames:
            - list_pools
            - get_pool
            - create_pool
            - delete_pool
            - list_pool_members
            - add_pool_member
            - remove_pool_member
            - set_pool_member_state
            - list_virtual_servers
            - get_virtual_server
            - create_virtual_server
            - delete_virtual_server
            - list_nodes
            - get_node
            - create_node
            - delete_node
            - set_node_state
            - list_monitors
            - list_http_monitors
            - list_https_monitors
            - list_tcp_monitors
            - list_irules
            - get_irule
            - list_certificates
            - get_certificate
            - system_info
            - failover_status
            - system_performance
            - config_sync_status
          requireApproval:
            - create_pool
            - delete_pool
            - add_pool_member
            - remove_pool_member
            - set_pool_member_state
            - create_virtual_server
            - delete_virtual_server
            - create_node
            - delete_node
            - set_node_state
