# ExternalSecret: F5 BIG-IP credentials (bigip)
# Pulls credentials from Vault path: secret/data/f5/bigip
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: f5-bigip-credentials
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: f5-bigip-credentials
    creationPolicy: Owner
  data:
    - secretKey: F5_HOST
      remoteRef:
        key: f5/bigip
        property: host
    - secretKey: F5_USERNAME
      remoteRef:
        key: f5/bigip
        property: username
    - secretKey: F5_PASSWORD
      remoteRef:
        key: f5/bigip
        property: password
