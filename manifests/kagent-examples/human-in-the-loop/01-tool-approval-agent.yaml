# Example: Agent with Tool Approval
#
# This agent can read, write, and delete files. Read operations execute
# immediately, but write and delete require user approval in the UI.
#
# Try it:
#   1. Open the kagent UI and chat with the agent
#   2. Ask it to delete or write a file — you'll see Approve/Reject buttons

---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: safe-file-agent
  namespace: kagent
spec:
  type: Declarative
  declarative:
    modelConfig: gpt4o
    systemMessage: |
      You are a Kubernetes change agent. You can inspect resources freely, but mutating operations require user approval.

      IMPORTANT: Write and delete operations require user approval. The user
      will see what you're about to do and can approve or reject it.

      Always explain what you plan to do before attempting file operations.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_apply_manifest
            - k8s_delete_resource
            - k8s_get_available_api_resources
          requireApproval:
            - k8s_apply_manifest
            - k8s_delete_resource
