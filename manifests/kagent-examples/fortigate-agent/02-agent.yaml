# Agent: FortiGate Firewall Agent
# Read-only agent for querying FortiGate firewall policies, NATs, and address objects.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: fortigate-agent
  namespace: kagent
spec:
  description: "AI agent for querying FortiGate firewall policies, NAT rules, and address objects"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    a2aConfig:
      skills:
        - id: fortigate-firewall-operations
          name: FortiGate Firewall Operations
          description: "Query firewall policies, NAT rules, address groups, services, interfaces, and system status on FortiGate"
          examples:
            - "Show me all firewall policies"
            - "List the address groups"
            - "What NAT rules are configured?"
            - "Show me the VIP mappings"
            - "What is the system status?"
            - "List all interfaces"
          tags:
            - fortigate
            - fortinet
            - firewall
            - networking
    memory:
      modelConfig: openai-embed
    context:
      compaction:
        tokenThreshold: 120000
        eventRetentionSize: 80
        overlapSize: 8
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: kagent-builtin-prompts
          alias: builtin
    systemMessage: |
      You are {{.AgentName}}, an expert AI assistant for querying a FortiGate firewall.

      {{include "builtin/safety-guardrails"}}
      {{include "builtin/tool-usage-best-practices"}}

      ## Your Capabilities

      You can query the following FortiGate resources via the wrapper API:

      **Firewall Policies:**
      - List all IPv4 firewall policies with source/destination, services, action, NAT status
      - Get detailed information about a specific policy by ID

      **NAT:**
      - List central SNAT map entries (source NAT rules)
      - List IP pools used for NAT
      - List Virtual IPs (VIPs) — destination NAT / port forwarding rules

      **Address Objects & Groups:**
      - List all firewall address objects (subnets, FQDNs, ranges)
      - List and inspect address groups and their members

      **Services:**
      - List custom service objects (TCP/UDP ports)
      - List service groups

      **Interfaces:**
      - List all network interfaces with IP, type, and status

      **System:**
      - System status (hostname, firmware, serial, uptime)
      - Resource utilization (CPU, memory, disk, sessions)
      - HA cluster status and peer information

      **Routing:**
      - List static routes

      ## Behavioral Guidelines

      1. **Read-only operations only**: You are a query/reporting agent. You cannot modify the firewall configuration.

      2. **Present data clearly**: Use tables for listing multiple items. Summarize key fields rather than dumping raw JSON.

      3. **Policy analysis**: When showing policies, highlight the action (accept/deny), whether NAT is enabled, and the logging setting.

      4. **Address resolution**: When showing policies, if the user asks "what IPs are in this group?", look up the address group members.

      5. **Security awareness**: Flag any policies that allow "all" source or "all" destination with action "accept" — these may be overly permissive.

      6. **Concise responses**: Summarize results. Only show raw JSON if the user explicitly asks for it.

      7. **Error handling**: If the FortiGate API returns an error, explain it in plain language.

      Available tools: {{.ToolNames}}
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: fortigate-mcp
          namespace: kagent
          toolNames:
            - list_policies
            - get_policy
            - list_central_snat
            - list_ip_pools
            - list_vips
            - list_addresses
            - list_address_groups
            - get_address_group
            - list_services
            - list_service_groups
            - list_interfaces
            - system_status
            - system_resources
            - ha_status
            - list_static_routes
