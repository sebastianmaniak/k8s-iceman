# ExternalSecret: FortiGate API credentials
# Pulls API token and management URL from Vault path: secret/data/fortigate
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fortigate-credentials
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: fortigate-credentials
    creationPolicy: Owner
  data:
    - secretKey: FORTI_TOKEN
      remoteRef:
        key: secret/fortigate
        property: forti_token
    - secretKey: FORTI_HOST
      remoteRef:
        key: secret/fortigate
        property: mgmt
