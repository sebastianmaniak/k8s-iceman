# FortiGate MCP Server Deployment
# Community FortiGate MCP server (github.com/alpadalar/fortigate-mcp-server)
# with entrypoint that generates config.json from environment variables.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fortigate-mcp-server
  namespace: kagent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortigate-mcp-server
  namespace: kagent
  labels:
    app: fortigate-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fortigate-mcp-server
  template:
    metadata:
      labels:
        app: fortigate-mcp-server
    spec:
      serviceAccountName: fortigate-mcp-server
      containers:
        - name: fortigate-mcp
          image: docker.io/sebbycorp/fortigate-mcp-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8814
          env:
            - name: FORTI_HOST
              valueFrom:
                secretKeyRef:
                  name: fortigate-credentials
                  key: FORTI_HOST
            - name: FORTI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fortigate-credentials
                  key: FORTI_TOKEN
            - name: FORTI_VDOM
              value: "root"
            - name: FORTI_PORT
              value: "443"
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            tcpSocket:
              port: 8814
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8814
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fortigate-mcp-server
  namespace: kagent
  labels:
    app: fortigate-mcp-server
spec:
  ports:
    - port: 8814
      targetPort: 8814
      protocol: TCP
      name: http
  selector:
    app: fortigate-mcp-server
  type: ClusterIP
---
# RemoteMCPServer: kagent discovers FortiGate tools via this MCP endpoint
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: fortigate-mcp
  namespace: kagent
spec:
  description: "FortiGate firewall MCP server — policies, NAT, VIPs, address objects, services, interfaces, routing, and system status"
  url: "http://fortigate-mcp-server.kagent:8814/fortigate-mcp/sse"
  timeout: "30s"
  sseReadTimeout: "5m0s"
---
# Network policy: allow traffic from kagent namespace, egress to FortiGate mgmt
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fortigate-mcp-server-policy
  namespace: kagent
spec:
  podSelector:
    matchLabels:
      app: fortigate-mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
      ports:
        - protocol: TCP
          port: 8814
  egress:
    # Allow outbound to FortiGate management network
    - to:
        - ipBlock:
            cidr: 172.16.0.0/12
      ports:
        - protocol: TCP
          port: 443
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
