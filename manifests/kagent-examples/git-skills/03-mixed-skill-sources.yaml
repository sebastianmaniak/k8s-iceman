# Example: Agent with Skills from Both OCI Images and Git Repositories
#
# Combine OCI-based skills with Git-based skills. The init container
# handles both sources in a single pass.

---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: multi-source-skills-agent
  namespace: kagent
spec:
  type: Declarative
  declarative:
    modelConfig: gpt4o
    systemMessage: |
      You are an expert operations agent with knowledge from multiple sources.
      List your available skills first, then load the relevant ones.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_pod_logs
            - helm_list_releases
    skills:
      # OCI image skills
      refs:
        - image: ghcr.io/kagent-dev/k8s-skills:latest

      # Git repository skills
      gitRefs:
        - url: https://github.com/myorg/helm-best-practices.git
          ref: main
        - url: https://github.com/myorg/troubleshooting-guides.git
          ref: v1.0
          path: k8s
          name: k8s-troubleshooting
