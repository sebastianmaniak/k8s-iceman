# ExternalSecret: Telegram bot token for FortiGate bot
# Pulls token from Vault path: secret/data/telegram
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: telegram-forti-bot-token
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: telegram-forti-bot-token
    creationPolicy: Owner
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: secret/telegram
        property: fortiaikagentbot_key
