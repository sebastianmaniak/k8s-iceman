# Telegram bot deployment for FortiGate agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telegram-forti-bot
  namespace: kagent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-forti-bot
  namespace: kagent
  labels:
    app: telegram-forti-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: telegram-forti-bot
  template:
    metadata:
      labels:
        app: telegram-forti-bot
    spec:
      serviceAccountName: telegram-forti-bot
      containers:
        - name: bot
          image: docker.io/sebbycorp/telegram-kagent-bot:latest
          imagePullPolicy: Always
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-forti-bot-token
                  key: TELEGRAM_BOT_TOKEN
            - name: KAGENT_A2A_URL
              value: "http://kagent-controller.kagent.svc.cluster.local:8083/api/a2a/kagent/fortigate-agent/"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - test
                - -f
                - /tmp/bot-healthy
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - test
                - -f
                - /tmp/bot-healthy
            initialDelaySeconds: 10
            periodSeconds: 10
