# ExternalSecret: Vault MCP server credentials
# Pulls the Vault token from Vault path: secret/data/vault/mcp
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-mcp-credentials
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-mcp-credentials
    creationPolicy: Owner
  data:
    - secretKey: VAULT_TOKEN
      remoteRef:
        key: vault/mcp
        property: token
