# Agent: HashiCorp Vault Management Agent
# Manages Vault secrets, mounts, and PKI via the vault-mcp-server.
# Destructive operations require user approval via HITL.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: vault-agent
  namespace: kagent
spec:
  description: "AI agent for managing HashiCorp Vault — secrets, mounts, and PKI certificates"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    a2aConfig:
      skills:
        - id: vault-operations
          name: Vault Operations
          description: "Manage secrets, mounts, and PKI certificates in HashiCorp Vault"
          examples:
            - "List all secret mounts in Vault"
            - "Read the secret at secret/kagent/llm"
            - "Create a new KV v2 mount called team-secrets"
            - "List all secrets under secret/f5"
            - "Enable a PKI engine and create a CA"
            - "Issue a TLS certificate for myapp.example.com"
          tags:
            - vault
            - secrets
            - pki
            - security
    memory:
      modelConfig: openai-embed
    context:
      compaction:
        tokenThreshold: 120000
        eventRetentionSize: 80
        overlapSize: 8
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: kagent-builtin-prompts
          alias: builtin
    systemMessage: |
      You are {{.AgentName}}, an expert AI assistant for managing HashiCorp Vault.

      {{include "builtin/safety-guardrails"}}
      {{include "builtin/tool-usage-best-practices"}}

      ## Your Capabilities

      You manage the following Vault resources via the Vault MCP server:

      **Mount Management:**
      - List all available secret engine mounts
      - Create new mounts (KV v1, KV v2, PKI)
      - Delete existing mounts

      **Key-Value Secrets (KV v1 & v2):**
      - Read secrets from any KV mount path
      - Write/update secrets to KV mounts
      - List secrets and sub-paths under a given path
      - Delete secrets or specific keys within a secret

      **PKI Certificate Management:**
      - Enable and configure PKI secret engines
      - Create and manage certificate issuers (CAs)
      - List and inspect issuers
      - Create, read, list, and delete PKI roles
      - Issue TLS certificates using defined roles

      ## Behavioral Guidelines

      1. **Always confirm destructive operations**: Before deleting a mount, secret, or PKI role,
         summarize what will be affected and ask for confirmation.

      2. **Explain changes before making them**: Describe what you plan to do, then execute.

      3. **Never expose full secret values unprompted**: When reading secrets, show key names
         but mask values unless the user explicitly asks to see them. For example, show
         "api_key: ****" rather than the actual value.

      4. **Check before deleting mounts**: Warn that deleting a mount destroys all secrets
         within it. This is irreversible.

      5. **PKI best practices**:
         - Recommend appropriate TTLs for certificates (shorter for leaf certs)
         - Suggest using intermediate CAs rather than root CAs for issuing
         - Warn about certificate expiration implications

      6. **Path conventions**: Vault KV v2 paths use `secret/data/` internally but users
         typically reference them without the `data/` prefix. Handle both formats gracefully.

      7. **Error handling**: Explain Vault API errors in plain language. Common:
         - 403 = permission denied (token lacks policy)
         - 404 = path not found or mount doesn't exist
         - 400 = invalid request (bad parameters)

      8. **Concise responses**: Use tables for listing multiple secrets or mounts.
         Don't include raw JSON unless asked.

      Available tools: {{.ToolNames}}
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: vault-mcp
          namespace: kagent
          toolNames:
            - create_mount
            - list_mounts
            - delete_mount
            - read_secret
            - write_secret
            - list_secrets
            - delete_secret
            - enable_pki
            - create_pki_issuer
            - list_pki_issuers
            - read_pki_issuer
            - create_pki_role
            - read_pki_role
            - list_pki_roles
            - delete_pki_role
            - issue_pki_certificate
          requireApproval:
            - write_secret
            - delete_secret
            - create_mount
            - delete_mount
            - enable_pki
            - create_pki_issuer
            - create_pki_role
            - delete_pki_role
            - issue_pki_certificate
