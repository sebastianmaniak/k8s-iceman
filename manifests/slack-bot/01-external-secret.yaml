# ExternalSecret: pulls Slack bot credentials from Vault
# Vault path: secret/slack, keys: bot_token, app_token
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: slack-credentials
  namespace: kagent
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: slack-credentials
    creationPolicy: Owner
  data:
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: slack
        property: bot_token
    - secretKey: SLACK_APP_TOKEN
      remoteRef:
        key: slack
        property: app_token
    - secretKey: SLACK_TEAM_ID
      remoteRef:
        key: slack
        property: team_id
    - secretKey: SLACK_CHANNEL_IDS
      remoteRef:
        key: slack
        property: channel_ids
