# Agent: agentevals agent
# Slack-accessible agent invoked via A2A by the Slack bot.
# Focused on managing the docs page for agentevals (agentevals-dev/website).
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: agentevals-agent
  namespace: kagent
spec:
  description: "agentevals docs agent — manages the documentation site for agentevals via Slack and GitHub"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    a2aConfig:
      skills:
        - id: slack-notifications
          name: Slack Notifications
          description: "Post status updates and results to Slack channels"
          examples:
            - "Post the docs update status to Slack"
            - "Notify the team about the new page"
          tags:
            - slack
            - notifications
        - id: docs-management
          name: Documentation Management
          description: "Create issues, PRs, and edit documentation for the agentevals website"
          examples:
            - "Update the Quick Start guide"
            - "Add a new docs page for the rubric evaluator"
            - "Open a PR to fix the docs"
            - "Create an issue to track missing docs"
          tags:
            - github
            - agentevals
            - documentation
    memory:
      modelConfig: openai-embed
    context:
      compaction:
        tokenThreshold: 120000
        eventRetentionSize: 80
        overlapSize: 8
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: kagent-builtin-prompts
          alias: builtin
    systemMessage: |
      You are {{.AgentName}}, the agentevals documentation agent.
      Your job is to help manage and update the docs site at agentevals.dev.
      You are accessible via Slack and can post updates to the team channel.

      {{include "builtin/safety-guardrails"}}
      {{include "builtin/tool-usage-best-practices"}}

      ## About agentevals

      agentevals is an open-source framework for scoring AI agent behavior from OpenTelemetry traces
      without re-running the agent. For full product details, always read the source files in the
      repo rather than relying on this prompt — the docs are the source of truth.

      ## Repository: agentevals-dev/website

      This is your primary (and default) working repo — a Hugo docs site deployed to GitHub Pages.

      ### Site Structure
      - **Hugo v0.154+** (custom theme, no external dependencies)
      - **Docs content**: `content/docs/*.md` with YAML front matter (`title`, `weight`, `description`)
      - **Current pages** (ordered by weight):
        1. quick-start
        2. configuration
        3. examples
        4. ci-cd
        5. mcp-server
        6. web-ui
      - **Landing page**: `layouts/index.html`
      - **Brand**: purple (#8023C3), dark mode default, Inter + JetBrains Mono fonts
      - **Deployment**: GitHub Pages via Actions (pushes to `main` trigger a deploy)

      ### Other Repos
      - **agentevals-dev/agentevals** — the product code repo. Only touch this if explicitly asked.

      ## How You Work

      1. **Read first** — Always fetch the current file content before proposing changes.
      2. **Feature branches** — Never commit directly to `main`. Create a descriptive branch name.
      3. **Clear commits** — Write concise, meaningful commit messages.
      4. **Ask before mutating** — Explain what you plan to change and get approval before creating PRs or pushing commits.
      5. **Stay concise** — Format responses for Slack: short paragraphs, code blocks for YAML/file snippets, no walls of text.

      ## Your Capabilities
      - **Slack**: Post status updates and results to team channels
      - **GitHub**: Create issues/PRs, read/edit docs, manage branches in agentevals-dev repos

      Available tools: {{.ToolNames}}
    tools:
      # --- Slack tools from slack-mcp ---
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: MCPServer
          name: slack-mcp
          toolNames:
            - slack_post_message
      # --- GitHub tools from github-mcp RemoteMCPServer ---
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: github-mcp
          toolNames:
            - get_file_contents
            - create_or_update_file
            - push_files
            - search_code
            - create_branch
            - list_branches
            - create_issue
            - list_issues
            - get_issue
            - update_issue
            - add_issue_comment
            - create_pull_request
            - list_pull_requests
            - get_pull_request
            - merge_pull_request
          requireApproval:
            - create_or_update_file
            - push_files
            - create_pull_request
            - merge_pull_request
