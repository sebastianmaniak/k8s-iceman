apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-otel
  namespace: agentgateway-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: langfuse-otel
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OTLP_ENDPOINT: '{{ .LANGFUSE_BASE_URL }}/api/public/otel'
        OTLP_PROTOCOL: 'http'
        OTLP_HEADERS: '{{ printf "{\"Authorization\":\"Basic %s\"}" (printf "%s:%s" .LANGFUSE_PUBLIC_KEY .LANGFUSE_SECRET_KEY | b64enc) }}'
  data:
    - secretKey: LANGFUSE_BASE_URL
      remoteRef:
        key: iceman_langfuse
        property: LANGFUSE_BASE_URL
    - secretKey: LANGFUSE_PUBLIC_KEY
      remoteRef:
        key: iceman_langfuse
        property: LANGFUSE_PUBLIC_KEY
    - secretKey: LANGFUSE_SECRET_KEY
      remoteRef:
        key: iceman_langfuse
        property: LANGFUSE_SECRET_KEY
