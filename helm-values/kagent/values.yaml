# kagent - Kubernetes-native AI Agent Framework
# Docs: https://kagent.dev
#
# LLM API keys are managed by Vault + External Secrets Operator.
# ESO creates secrets: kagent-openai, kagent-xai, kagent-anthropic
# matching the names the kagent chart expects.

# LLM Providers
providers:
  default: openAI
  openAI:
    model: "gpt-5.4"

# Database (default: SQLite with vector support)
database:
  type: sqlite
  sqlite:
    vectorEnabled: true

# Controller
controller:
  replicas: 1
  loglevel: info
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2
      memory: 512Mi

# UI
ui:
  replicas: 1
  service:
    type: ClusterIP

# kmcp - MCP toolkit (bundled since v0.7)
kmcp:
  enabled: true

# Built-in agents
agents:
  k8s-agent:
    enabled: true
  kgateway-agent:
    enabled: true
  istio-agent:
    enabled: true
  helm-agent:
    enabled: true
  argo-rollouts-agent:
    enabled: true
  promql-agent:
    enabled: true
  observability-agent:
    enabled: true

# Built-in tool server
# NOTE: kagent chart 0.8.0-beta1 defaults to `kagent-tools.nameOverride: tools`,
# which causes Service selectors/labels to not match the Deployment labels.
# Result: svc/kagent-tools has no endpoints and RemoteMCPServer `kagent-tool-server`
# fails to initialize (connection refused).
# Keep the override consistent with the Deployment labels.
kagent-tools:
  nameOverride: kagent-tools
  # Keep the Service name stable (the chart's RemoteMCPServer URL is hard-coded
  # to http://kagent-tools.<ns>:8084/mcp in 0.8.0-beta1)
  fullnameOverride: kagent-tools
